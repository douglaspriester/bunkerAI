<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 - Bunker AI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  color: #e0e0e0;
  font-family: 'Courier New', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}
.title-bar {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  background: #0d1117;
  border-bottom: 1px solid #00d4ff33;
}
.title-bar h1 { font-size: 1.2em; color: #00d4ff; }
.back-btn {
  background: none; border: 1px solid #00d4ff; color: #00d4ff;
  padding: 5px 12px; cursor: pointer; font-family: inherit;
  font-size: 0.85em; border-radius: 3px; transition: all 0.2s;
}
.back-btn:hover { background: #00d4ff22; box-shadow: 0 0 8px #00d4ff44; }
.score-bar {
  display: flex; gap: 20px; padding: 12px; flex-wrap: wrap; justify-content: center;
}
.score-box {
  background: #0d1117; border: 1px solid #00d4ff33;
  padding: 8px 18px; border-radius: 4px; text-align: center;
}
.score-box .label { font-size: 0.7em; color: #888; }
.score-box .val { font-size: 1.3em; color: #ff6b35; font-weight: bold; }
.board {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 8px;
  background: #161b22;
  border-radius: 8px;
  border: 1px solid #00d4ff22;
  width: min(90vw, 400px);
  aspect-ratio: 1;
}
.tile {
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  font-weight: bold;
  font-size: clamp(1em, 4vw, 1.8em);
  transition: all 0.12s ease;
  aspect-ratio: 1;
}
.tile.empty { background: #21262d; }
.btn {
  background: #0d1117; border: 1px solid #00d4ff; color: #00d4ff;
  padding: 8px 25px; margin: 10px 5px; cursor: pointer;
  font-family: inherit; font-size: 0.9em; border-radius: 4px; transition: all 0.2s;
}
.btn:hover { background: #00d4ff22; box-shadow: 0 0 12px #00d4ff44; }
.controls { padding: 8px; font-size: 0.8em; color: #888; }
.overlay {
  position: fixed; top:0;left:0;right:0;bottom:0;
  background: #0a0a0fdd;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 10;
}
.overlay.hidden { display: none; }
.overlay h2 { color: #00d4ff; font-size: 2em; margin-bottom: 10px; }
.overlay p { margin: 5px 0; }
.overlay .fval { color: #ff6b35; font-size: 1.5em; font-weight: bold; }
</style>
</head>
<body>
<div class="title-bar">
  <button class="back-btn" onclick="window.parent.postMessage('close-game','*');history.back();">&larr; Voltar</button>
  <h1>2048</h1>
  <div></div>
</div>
<div class="score-bar">
  <div class="score-box"><div class="label">SCORE</div><div class="val" id="score">0</div></div>
  <div class="score-box"><div class="label">BEST</div><div class="val" id="best">0</div></div>
</div>
<div>
  <button class="btn" onclick="newGame()">New Game</button>
</div>
<div class="board" id="board"></div>
<div class="controls">Arrow Keys or Swipe to play</div>

<div class="overlay hidden" id="winOverlay">
  <h2>YOU WIN!</h2>
  <p>You reached 2048!</p>
  <p>Score: <span class="fval" id="winScore">0</span></p>
  <button class="btn" onclick="continueGame()">Continue</button>
  <button class="btn" onclick="newGame()">New Game</button>
</div>
<div class="overlay hidden" id="loseOverlay">
  <h2>GAME OVER</h2>
  <p>Score: <span class="fval" id="loseScore">0</span></p>
  <button class="btn" onclick="newGame()">Try Again</button>
</div>

<script>
const SIZE = 4;
let grid, score, best, won, gameActive;
best = parseInt(localStorage.getItem('2048_best')||'0');

const TILE_COLORS = {
  0:'#21262d', 2:'#1a3a4a', 4:'#1a4a3a', 8:'#2a5a3a', 16:'#3a5a2a',
  32:'#5a4a1a', 64:'#6a3a1a', 128:'#00d4ff33', 256:'#00d4ff55',
  512:'#00d4ff77', 1024:'#00d4ff99', 2048:'#00d4ffcc',
  4096:'#ff6b3566', 8192:'#ff6b3599'
};
const TEXT_COLORS = {
  0:'transparent', 2:'#aaa', 4:'#bbb', 8:'#ddd', 16:'#eee',
  32:'#fff', 64:'#fff', 128:'#00d4ff', 256:'#00d4ff',
  512:'#00d4ff', 1024:'#00ffcc', 2048:'#00ffcc',
  4096:'#ff6b35', 8192:'#ff6b35'
};

function newGame() {
  document.getElementById('winOverlay').classList.add('hidden');
  document.getElementById('loseOverlay').classList.add('hidden');
  grid = Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  score = 0; won = false; gameActive = true;
  addRandom(); addRandom();
  render();
}

function continueGame() {
  document.getElementById('winOverlay').classList.add('hidden');
  gameActive = true;
}

function addRandom() {
  const empty = [];
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(grid[r][c]===0) empty.push({r,c});
  if(empty.length===0) return;
  const cell = empty[Math.floor(Math.random()*empty.length)];
  grid[cell.r][cell.c] = Math.random()<0.9 ? 2 : 4;
}

function slide(row) {
  let a = row.filter(v=>v!==0);
  let merged = false;
  for(let i=0;i<a.length-1;i++) {
    if(a[i]===a[i+1]) {
      a[i]*=2; score+=a[i]; a.splice(i+1,1);
      if(a[i]===2048 && !won) { won=true; }
      merged = true;
    }
  }
  while(a.length<SIZE) a.push(0);
  return a;
}

function move(dir) {
  if(!gameActive) return;
  const prev = JSON.stringify(grid);
  if(dir==='left') {
    for(let r=0;r<SIZE;r++) grid[r]=slide(grid[r]);
  } else if(dir==='right') {
    for(let r=0;r<SIZE;r++) grid[r]=slide(grid[r].reverse()).reverse();
  } else if(dir==='up') {
    for(let c=0;c<SIZE;c++) {
      let col=[]; for(let r=0;r<SIZE;r++) col.push(grid[r][c]);
      col=slide(col);
      for(let r=0;r<SIZE;r++) grid[r][c]=col[r];
    }
  } else if(dir==='down') {
    for(let c=0;c<SIZE;c++) {
      let col=[]; for(let r=0;r<SIZE;r++) col.push(grid[r][c]);
      col=slide(col.reverse()).reverse();
      for(let r=0;r<SIZE;r++) grid[r][c]=col[r];
    }
  }
  if(JSON.stringify(grid)!==prev) {
    addRandom();
    render();
    if(won && !document.getElementById('winOverlay').classList.contains('shown-once')) {
      gameActive = false;
      document.getElementById('winScore').textContent=score;
      document.getElementById('winOverlay').classList.remove('hidden');
      document.getElementById('winOverlay').classList.add('shown-once');
    }
    if(isGameOver()) {
      gameActive = false;
      document.getElementById('loseScore').textContent=score;
      document.getElementById('loseOverlay').classList.remove('hidden');
    }
  }
}

function isGameOver() {
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) {
    if(grid[r][c]===0) return false;
    if(c<SIZE-1&&grid[r][c]===grid[r][c+1]) return false;
    if(r<SIZE-1&&grid[r][c]===grid[r+1][c]) return false;
  }
  return true;
}

function render() {
  if(score>best) { best=score; localStorage.setItem('2048_best',best); }
  document.getElementById('score').textContent=score;
  document.getElementById('best').textContent=best;
  const b = document.getElementById('board');
  b.innerHTML='';
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) {
    const v=grid[r][c];
    const t=document.createElement('div');
    t.className='tile'+(v===0?' empty':'');
    t.style.background=TILE_COLORS[v]||'#ff6b35bb';
    t.style.color=TEXT_COLORS[v]||'#fff';
    if(v>=128) { t.style.boxShadow=`0 0 12px ${TILE_COLORS[v]}`; }
    if(v) t.textContent=v;
    if(v>=1024) t.style.fontSize='clamp(0.8em,3vw,1.4em)';
    b.appendChild(t);
  }
}

document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'ArrowLeft': move('left'); e.preventDefault(); break;
    case 'ArrowRight': move('right'); e.preventDefault(); break;
    case 'ArrowUp': move('up'); e.preventDefault(); break;
    case 'ArrowDown': move('down'); e.preventDefault(); break;
  }
});

let tx,ty;
document.addEventListener('touchstart', e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; });
document.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<20&&Math.abs(dy)<20) return;
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
});

newGame();
</script>
</body>
</html>
