<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake - Bunker AI</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  color: #e0e0e0;
  font-family: 'Courier New', monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
}
.title-bar {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  background: #0d1117;
  border-bottom: 1px solid #00d4ff33;
}
.title-bar h1 { font-size: 1.2em; color: #00d4ff; }
.back-btn {
  background: none;
  border: 1px solid #00d4ff;
  color: #00d4ff;
  padding: 5px 12px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.85em;
  border-radius: 3px;
  transition: all 0.2s;
}
.back-btn:hover { background: #00d4ff22; box-shadow: 0 0 8px #00d4ff44; }
.score-bar {
  display: flex;
  gap: 30px;
  padding: 10px;
  font-size: 1em;
}
.score-bar span { color: #00d4ff; }
.score-bar .val { color: #ff6b35; font-weight: bold; }
.game-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
}
canvas {
  border: 1px solid #00d4ff44;
  background: #0d1117;
  image-rendering: pixelated;
}
.overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #0a0a0fdd;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.overlay.hidden { display: none; }
.overlay h2 { color: #00d4ff; font-size: 2em; margin-bottom: 10px; }
.overlay p { margin: 5px 0; font-size: 1.1em; }
.overlay .final-score { color: #ff6b35; font-size: 1.5em; font-weight: bold; }
.btn {
  background: #0d1117;
  border: 1px solid #00d4ff;
  color: #00d4ff;
  padding: 10px 30px;
  margin-top: 20px;
  cursor: pointer;
  font-family: inherit;
  font-size: 1em;
  border-radius: 4px;
  transition: all 0.2s;
}
.btn:hover { background: #00d4ff22; box-shadow: 0 0 12px #00d4ff44; }
.controls-info {
  padding: 8px;
  font-size: 0.8em;
  color: #888;
  text-align: center;
}
.mobile-controls {
  display: none;
  gap: 5px;
  padding: 10px;
}
.d-btn {
  width: 60px; height: 60px;
  background: #0d1117;
  border: 1px solid #00d4ff55;
  color: #00d4ff;
  font-size: 1.5em;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.d-btn:active { background: #00d4ff33; }
.d-pad { display: grid; grid-template-columns: 60px 60px 60px; grid-template-rows: 60px 60px 60px; gap: 4px; }
.d-pad .empty { visibility: hidden; }
@media (max-width: 600px) {
  .mobile-controls { display: flex; justify-content: center; }
}
</style>
</head>
<body>
<div class="title-bar">
  <button class="back-btn" onclick="window.parent.postMessage('close-game','*');history.back();">&larr; Voltar</button>
  <h1>SNAKE</h1>
  <div></div>
</div>
<div class="score-bar">
  <div>Score: <span class="val" id="score">0</span></div>
  <div>Best: <span class="val" id="best">0</span></div>
  <div>Length: <span class="val" id="length">3</span></div>
</div>
<div class="game-area">
  <canvas id="c"></canvas>
</div>
<div class="controls-info">Arrow Keys to move | WASD also works | Space to pause</div>
<div class="mobile-controls">
  <div class="d-pad">
    <div class="empty"></div>
    <button class="d-btn" ontouchstart="setDir(0,-1)">&#9650;</button>
    <div class="empty"></div>
    <button class="d-btn" ontouchstart="setDir(-1,0)">&#9664;</button>
    <div class="empty"></div>
    <button class="d-btn" ontouchstart="setDir(1,0)">&#9654;</button>
    <div class="empty"></div>
    <button class="d-btn" ontouchstart="setDir(0,1)">&#9660;</button>
    <div class="empty"></div>
  </div>
</div>

<div class="overlay" id="startOverlay">
  <h2>SNAKE</h2>
  <p>Use arrow keys or WASD to move</p>
  <p>Eat food to grow</p>
  <button class="btn" id="startBtn">Start Game</button>
</div>

<div class="overlay hidden" id="gameOverOverlay">
  <h2>GAME OVER</h2>
  <p>Score: <span class="final-score" id="finalScore">0</span></p>
  <button class="btn" id="restartBtn">Play Again</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const COLS = 20, ROWS = 20, CELL = 20;
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

let snake, dir, nextDir, food, score, best, gameLoop, paused, running;
best = parseInt(localStorage.getItem('snake_best') || '0');
document.getElementById('best').textContent = best;

function init() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  score = 0;
  paused = false;
  running = true;
  placeFood();
  updateUI();
}

function placeFood() {
  let free = [];
  for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++) {
    if(!snake.some(s=>s.x===x&&s.y===y)) free.push({x,y});
  }
  food = free[Math.floor(Math.random()*free.length)];
}

function setDir(dx,dy) {
  if(dir.x===-dx && dir.y===-dy) return;
  if(dir.x===dx && dir.y===dy) return;
  nextDir = {x:dx,y:dy};
}

function step() {
  if(paused||!running) return;
  dir = nextDir;
  const head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    gameOver(); return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y) {
    score += 10;
    placeFood();
  } else {
    snake.pop();
  }
  updateUI();
  draw();
}

function draw() {
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  // Grid lines
  ctx.strokeStyle = '#ffffff08';
  ctx.lineWidth = 0.5;
  for(let x=0;x<=COLS;x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,ROWS*CELL); ctx.stroke(); }
  for(let y=0;y<=ROWS;y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(COLS*CELL,y*CELL); ctx.stroke(); }
  // Food
  ctx.fillStyle = '#ff6b35';
  ctx.shadowColor = '#ff6b35';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-2, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
  // Snake
  snake.forEach((s,i) => {
    const t = i/snake.length;
    ctx.fillStyle = i===0 ? '#00ffcc' : `rgba(0,212,255,${1-t*0.6})`;
    if(i===0) { ctx.shadowColor='#00d4ff'; ctx.shadowBlur=6; }
    ctx.fillRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2);
    ctx.shadowBlur=0;
  });
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('length').textContent = snake.length;
}

function gameOver() {
  running = false;
  clearInterval(gameLoop);
  if(score > best) { best = score; localStorage.setItem('snake_best', best); document.getElementById('best').textContent = best; }
  document.getElementById('finalScore').textContent = score;
  document.getElementById('gameOverOverlay').classList.remove('hidden');
}

function startGame() {
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('gameOverOverlay').classList.add('hidden');
  init();
  draw();
  gameLoop = setInterval(step, 120);
}

document.getElementById('startBtn').onclick = startGame;
document.getElementById('restartBtn').onclick = startGame;

document.addEventListener('keydown', e => {
  switch(e.key) {
    case 'ArrowUp': case 'w': case 'W': setDir(0,-1); e.preventDefault(); break;
    case 'ArrowDown': case 's': case 'S': setDir(0,1); e.preventDefault(); break;
    case 'ArrowLeft': case 'a': case 'A': setDir(-1,0); e.preventDefault(); break;
    case 'ArrowRight': case 'd': case 'D': setDir(1,0); e.preventDefault(); break;
    case ' ': paused = !paused; e.preventDefault(); break;
  }
});

// Touch swipe
let tx,ty;
canvas.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; e.preventDefault(); });
canvas.addEventListener('touchend', e => {
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0); else setDir(0,dy>0?1:-1);
  e.preventDefault();
});

// Initial draw
init(); draw();
</script>
</body>
</html>
